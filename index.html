<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StroyHous — Магазин стройматериалов</title>
<script>
  // адрес твоего сервера
  const API="https://api.stroyhous.ru/api";
  // помощник для запросов к серверу
  async function apiGet(path){const r=await fetch(API+path);if(!r.ok)throw new Error('GET '+path);return r.json();}
  async function apiSend(path,method,body){const r=await fetch(API+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});if(!r.ok){let e={};try{e=await r.json();}catch(_){}throw new Error(e.error||method+' '+path);}return r.json();}
</script>
<script src="https://api-maps.yandex.ru/2.1/?apikey=c173e7c0-c0a8-4813-b5cb-989723160036&lang=ru_RU" type="text/javascript"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0b;--surface:#161618;--surface2:#1f1f23;--border:#2a2a30;--accent:#f97316;--accent-dark:#ea580c;--text:#f5f5f4;--muted:#8a8a93;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);padding-bottom:90px;min-height:100vh;}
  .container{max-width:1100px;margin:0 auto;padding:0 16px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:24px 0 16px;}
  .logo{font-size:34px;font-weight:800;letter-spacing:-1px;}
  .logo span{color:var(--accent);}
  .login-btn{padding:11px 18px;border-radius:14px;background:var(--surface2);border:none;cursor:pointer;color:var(--text);font-family:inherit;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;}
  .login-btn.logged{color:var(--accent);}
  .cats{display:flex;gap:10px;overflow-x:auto;padding:8px 0 16px;scrollbar-width:none;}
  .cats::-webkit-scrollbar{display:none;}
  .cat{flex-shrink:0;padding:13px 22px;border-radius:16px;background:var(--surface2);border:none;cursor:pointer;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;white-space:nowrap;transition:.15s;}
  .cat.active{background:var(--accent);color:#fff;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  @media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr);}}
  .card{background:var(--surface);border-radius:20px;padding:12px;display:flex;flex-direction:column;cursor:pointer;transition:.15s;border:1px solid transparent;}
  .card:active{transform:scale(.98);}
  .card-img{background:var(--surface2);border-radius:14px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative;margin-bottom:10px;overflow:hidden;}
  .card-img img{width:100%;height:100%;object-fit:cover;}
  .badge{position:absolute;top:10px;left:10px;padding:5px 11px;border-radius:10px;font-size:12px;font-weight:700;color:#fff;}
  .badge.discount{background:var(--red);}.badge.new{background:var(--blue);}.badge.hit{background:var(--accent);}
  .fav{position:absolute;top:8px;right:8px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);border:none;cursor:pointer;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;}
  .fav.active{color:var(--red);}
  .brand{font-size:13px;color:var(--muted);margin-bottom:2px;}
  .name{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:4px;flex:1;}
  .weight{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .price-row{display:flex;justify-content:space-between;align-items:flex-end;}
  .price{font-size:19px;font-weight:800;color:var(--accent);}
  .old-price{font-size:13px;color:var(--muted);text-decoration:line-through;}
  .add-btn{width:42px;height:42px;border-radius:13px;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .add-btn:active{background:var(--accent-dark);}
  .bottomnav{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--surface2);border-radius:24px;display:flex;gap:4px;padding:8px;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .nav-item{background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 14px;border-radius:16px;transition:.15s;position:relative;}
  .nav-item.active{background:var(--accent);color:#fff;}
  .nav-item svg{width:22px;height:22px;}
  .nav-badge{position:absolute;top:2px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .loading,.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:16px;}
  .spinner{width:40px;height:40px;border:4px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .section-title{font-size:22px;font-weight:800;margin:8px 0 16px;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end;justify-content:center;}
  .modal.open{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:600px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideup .25s ease;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-img{background:var(--surface);aspect-ratio:3/4;max-height:60vh;display:flex;align-items:center;justify-content:center;font-size:120px;position:relative;overflow:hidden;}
  .sheet-img img{width:100%;height:100%;object-fit:cover;}
  .gallery{position:relative;aspect-ratio:3/4;max-height:65vh;background:var(--surface);overflow:hidden;}
  .gallery-track{display:flex;height:100%;transition:transform .3s ease;}
  .gallery-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;}
  .gallery-slide img{width:100%;height:100%;object-fit:cover;}
  .gallery-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3;}
  .gallery-dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s;}
  .gallery-dots span.on{background:#fff;width:22px;border-radius:4px;}
  .gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:20px;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center;}
  .gallery-arrow.left{left:12px;}.gallery-arrow.right{right:12px;}
  .sheet-back{position:absolute;top:16px;left:16px;width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.5);border:none;cursor:pointer;color:#fff;font-size:20px;z-index:2;}
  .sheet-body{padding:24px;}
  .sheet-brand{color:var(--muted);font-size:15px;}
  .sheet-name{font-size:26px;font-weight:800;margin:4px 0 16px;line-height:1.2;}
  .sheet-price{font-size:32px;font-weight:800;color:var(--accent);}
  .sheet-stock{display:flex;align-items:center;gap:8px;margin:16px 0;color:var(--text);font-weight:600;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--green);}
  .divider{height:1px;background:var(--border);margin:18px 0;}
  .sheet-h{font-size:19px;font-weight:700;margin-bottom:8px;}
  .sheet-desc{color:var(--muted);line-height:1.6;}
  .delivery-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;}
  .delivery-row .left{display:flex;align-items:center;gap:12px;font-weight:600;}
  .delivery-row .ico{font-size:22px;}
  .free{color:var(--green);font-weight:700;}
  .cart-item{display:flex;gap:14px;background:var(--surface);border-radius:18px;padding:12px;margin-bottom:12px;align-items:center;}
  .cart-emoji{width:64px;height:64px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;overflow:hidden;}
  .cart-emoji img{width:100%;height:100%;object-fit:cover;}
  .cart-info{flex:1;}
  .cart-info .n{font-weight:600;font-size:15px;}
  .cart-info .p{color:var(--accent);font-weight:800;margin-top:4px;}
  .cart-info .w{color:var(--muted);font-size:12px;}
  .qty{display:flex;align-items:center;gap:10px;}
  .qty button{width:32px;height:32px;border-radius:9px;border:none;background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;}
  .qty span{min-width:22px;text-align:center;font-weight:700;}
  .cart-total{background:var(--surface);border-radius:18px;padding:20px;margin:18px 0;}
  .ct-row{display:flex;justify-content:space-between;margin-bottom:10px;color:var(--muted);}
  .ct-row.big{color:var(--text);font-size:20px;font-weight:800;margin-bottom:0;padding-top:10px;border-top:1px solid var(--border);}
  .checkout-btn{width:100%;padding:18px;border-radius:16px;background:var(--accent);border:none;color:#fff;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;}
  .checkout-btn:active{background:var(--accent-dark);}
  .ship-options{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
  .ship-opt{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--surface);border:2px solid var(--border);border-radius:14px;cursor:pointer;font-weight:600;}
  .ship-opt.sel{border-color:var(--accent);}
  .ship-opt .l{display:flex;align-items:center;gap:10px;}
  .field{width:100%;padding:15px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:16px;font-family:inherit;margin-bottom:12px;}
  #map{width:100%;height:450px;border-radius:16px;margin:12px 0;background:var(--surface2);overflow:hidden;}
  .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;padding:20px;}
  .hidden{display:none!important;}
  .info-card{background:var(--surface);border-radius:18px;padding:20px;}
  .otp-inputs{display:flex;gap:10px;justify-content:center;margin:20px 0;}
  .otp-inputs input{width:48px;height:58px;text-align:center;font-size:24px;font-weight:700;border-radius:12px;background:var(--surface);border:2px solid var(--border);color:var(--text);}
  .otp-inputs input:focus{border-color:var(--accent);outline:none;}
  .profile-hero{text-align:center;padding:50px 24px;}
  .profile-hero .ava{width:90px;height:90px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 18px;}
</style>
</head>

<script>

  function saveCart(){localStorage.setItem('sh_cart',JSON.stringify(cart));}

  let pendingPhone='', genCode='', deliveryKm=null, deliveryAddr='', currentShip='pickup', ymap=null;

  const SHOP={lat:55.5022, lon:37.5575, name:'StroyHous, Симферопольское шоссе 17А'};
  const PRICE_PER_KM=30, PRICE_PER_KG=30;
  let categories=['Все','Инструменты','Материалы','Сантехника','Отделка','Электрика'];
  const DEFAULT_CATS=["Смеси строительные","Смеси строительные/Стяжка и кладка","Смеси строительные/Шпаклевка","Смеси строительные/Штукатурки","Смеси строительные/Плиточный клей","Общестрой","Общестрой/Блок, кирпич","Общестрой/Гипсокартон и комплектующие","Общестрой/Листовой материал","Общестрой/Нерудный материал","Общестрой/Серпянка, стеклохолст","Общестрой/Хозяйственные товары","Общестрой/Крепёж","Изоляция","Изоляция/Расходник","Изоляция/Отрезные круги","Изоляция/Ручной инструмент","Изоляция/Крепёж","Изоляция/Электроинструмент","Пиломатериалы","Металл","Металл/Арматура строительная","Металл/Сетка металлическая","Металл/Системы ограждения","Лакокрасочные материалы","Лакокрасочные материалы/Краска и эмаль","Лакокрасочные материалы/Лак и растворитель","Лакокрасочные материалы/Грунтовки и пропитки","Лакокрасочные материалы/Герметик","Лакокрасочные материалы/Клей монтажный","Электротовары","Электротовары/Кабельная продукция","Электротовары/Автоматы","Электротовары/Освещение","Инженерная сантехника","Инженерная сантехника/Краны, фитинги, вентили","Инженерная сантехника/Полипропиленовые трубы фитинги","Инженерная сантехника/Трубы","Инженерная сантехника/Гибкая подводка","Инженерная сантехника/Редукторы, фильтры, клапаны","Инженерная сантехника/Сантехнические люки","Инженерная сантехника/Коллекторы","Инженерная сантехника/Обогревательное оборудование","Отделочные материалы","Отделочные материалы/Керамогранит","Отделочные материалы/Обои на флизелиновой основе","Отделочные материалы/Подвесные потолки"];
  function loadCategories(){
    apiGet('/categories').then(list=>{
      // если сервер вернул мало категорий — берём полное дерево из кода

  // ===== Дерево категорий (боковое меню) =====
  function openCatMenu(){renderCatTree();document.getElementById('cat-menu-overlay').style.display='block';document.getElementById('cat-menu').style.transform='translateX(0)';}

  function buildCatTree(){
    // categories = массив строк, часть с "/" — подкатегории
    const tree={};
    categories.forEach(c=>{
      if(c==='Все')return;
      const parts=c.split('/');
      const main=parts[0].trim();
      if(!tree[main])tree[main]={subs:[],full:main};
      if(parts.length>1)tree[main].subs.push({name:parts[1].trim(),full:c});
    });
    return tree;
  }
  function renderCatTree(){
    const tree=buildCatTree();

      const t=tree[main];
      const hasSubs=t.subs.length>0;

  function updateBadge(){const n=Object.values(cart).reduce((a,b)=>a+b,0);const b=document.getElementById('cart-badge');if(n>0){b.textContent=n;b.classList.remove('hidden');}else b.classList.add('hidden');}

  function cartSum(){return Object.entries(cart).reduce((s,[id,q])=>{const p=allProducts.find(x=>x.id===id);return s+(p?p.price*q:0);},0);}
  function cartWeight(){return Object.entries(cart).reduce((s,[id,q])=>{const p=allProducts.find(x=>x.id===id);return s+(p&&p.weight?p.weight*q:0);},0);}
  function calcDelivery(){
    const weight=cartWeight();
    if(deliveryKm===null)return null;
    const km=Math.ceil(deliveryKm);
    const kg=Math.ceil(weight);
    const price=km*PRICE_PER_KM + kg*PRICE_PER_KG;
    return{price,free:false,km,kg,weight};
  }
  function renderCart(){
    const el=document.getElementById('cart-list');const ids=Object.keys(cart);
    if(!ids.length){el.innerHTML='<div class="empty">Корзина пуста 🛒<br>Добавьте товары из каталога</div>';return;}
    let html=ids.map(id=>{const p=allProducts.find(x=>x.id===id);if(!p)return'';const w=p.weight?`<div class="w">${p.weight} кг × ${cart[id]} = ${(p.weight*cart[id]).toFixed(1)} кг</div>`:'';return `<div class="cart-item"><div class="cart-emoji">${imgOrEmoji(p)}</div><div class="cart-info"><div class="n">${p.name}</div><div class="p">${fmt(p.price)} ₽</div>${w}</div><div class="qty"><button onclick="changeQty('${id}',-1)">−</button><span>${cart[id]}</span><button onclick="changeQty('${id}',1)">+</button></div></div>`;}).join('');
    html+=`<div class="sheet-h" style="margin-top:8px;">Способ получения</div><div class="ship-options"><label class="ship-opt sel" data-ship="pickup"><span class="l">🏪 Самовывоз</span><span class="free">Бесплатно</span></label><label class="ship-opt" data-ship="courier"><span class="l">🚚 Курьером</span><span id="courier-price" style="color:var(--accent);">Обсуждается</span></label></div>`;
    html+=`<div id="courier-block" class="hidden"><div class="sheet-h">📍 Адрес доставки</div><input id="addr-input" class="field" placeholder="Город, улица, дом, квартира" onkeydown="if(event.key==='Enter')findAddress()"><button class="checkout-btn" style="background:var(--surface2);margin-bottom:12px;" onclick="findAddress()">🔍 Найти адрес на карте</button><p style="color:var(--muted);font-size:13px;margin-bottom:10px;">Напишите адрес и нажмите «Найти» — карта сама поставит точку. Или нажмите место на карте вручную.</p><div id="map"><div class="map-fallback">Загрузка карты…</div></div><div id="addr-shown" style="margin-top:14px;"></div><div id="delivery-info"></div></div>`;
    html+=`<div class="cart-total" id="cart-total"></div><button class="checkout-btn" id="checkout-btn" onclick="checkout()">Оформить заказ</button>`;
    el.innerHTML=html;bindShipOptions();updateTotals();
  }
  function bindShipOptions(){
    document.querySelectorAll('.ship-opt').forEach(opt=>{opt.addEventListener('click',()=>{document.querySelectorAll('.ship-opt').forEach(o=>o.classList.remove('sel'));opt.classList.add('sel');currentShip=opt.dataset.ship;const cb=document.getElementById('courier-block');cb.classList.toggle('hidden',currentShip!=='courier');if(currentShip==='courier')setTimeout(initShopMap,300);updateTotals();});});

  function updateTotals(){
    const sum=cartSum();
    const tot=document.getElementById('cart-total');

    if(tot)tot.innerHTML=`<div class="ct-row"><span>Товары (${Object.values(cart).reduce((a,b)=>a+b,0)} шт)</span><span>${fmt(sum)} ₽</span></div><div class="ct-row"><span>Доставка</span><span>${deliveryLabel}</span></div><div class="ct-row big"><span>Итого за товары</span><span>${fmt(sum)} ₽</span></div>${currentShip==='courier'?'<p style="color:var(--muted);font-size:13px;margin-top:10px;">💬 Стоимость доставки менеджер обсудит с вами после оформления</p>':''}`;
    const cb=document.getElementById('checkout-btn');if(cb)cb.textContent='Оформить заказ';

  let deliveryPlacemark=null, routeLine=null;
  function initShopMap(){
    const mapEl=document.getElementById('map');
    if(!mapEl)return;
    if(typeof ymaps==='undefined'){
      mapEl.innerHTML='<div class="map-fallback">Карта недоступна. Введите адрес и нажмите «Рассчитать».</div>';
      return;
    }
    ymaps.ready(function(){
      try{
        if(ymap){try{ymap.destroy();}catch(e){}ymap=null;}
        deliveryPlacemark=null;routeLine=null;
        mapEl.innerHTML='';
        ymap=new ymaps.Map(mapEl,{center:[SHOP.lat,SHOP.lon],zoom:11,controls:['zoomControl']});
        ymap.geoObjects.add(new ymaps.Placemark([SHOP.lat,SHOP.lon],{balloonContent:'🏪 Магазин StroyHous, Симферопольское шоссе 17А',hintContent:'Магазин StroyHous'},{preset:'islands#redShopIcon'}));
        // подсказка сверху
        const hint=document.createElement('div');
        hint.innerHTML='👆 Нажмите на карте, где нужна доставка';
        hint.style.cssText='position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.3);pointer-events:none;';
        mapEl.style.position='relative';
        mapEl.appendChild(hint);
        // клик по карте = точка доставки
        ymap.events.add('click',function(e){
          const coords=e.get('coords');
          setDeliveryPoint(coords);
        });
      }catch(err){
        console.error('Ошибка карты:',err);
        mapEl.innerHTML='<div class="map-fallback">Не удалось загрузить карту. Введите адрес и нажмите «Рассчитать».</div>';
      }
    });

  function setDeliveryPoint(coords){
    if(!ymap)return;
    // ставим/двигаем метку доставки
    if(deliveryPlacemark){ymap.geoObjects.remove(deliveryPlacemark);}
    deliveryPlacemark=new ymaps.Placemark(coords,{balloonContent:'📍 Сюда доставка',hintContent:'Адрес доставки'},{preset:'islands#blueHomeIcon',draggable:true});
    ymap.geoObjects.add(deliveryPlacemark);
    // линия магазин→точка
    if(routeLine){ymap.geoObjects.remove(routeLine);}
    routeLine=new ymaps.Polyline([[SHOP.lat,SHOP.lon],coords],{},{strokeColor:'#f97316',strokeWidth:3});
    ymap.geoObjects.add(routeLine);
    // тащим метку — пересчитываем
    deliveryPlacemark.events.add('dragend',function(){setDeliveryPoint(deliveryPlacemark.geometry.getCoordinates());});
    // расстояние и расчёт (без геокодера)
    const dist=geoDistance(SHOP.lat,SHOP.lon,coords[0],coords[1]);
    deliveryKm=dist;
    showDeliveryCalc(dist);
  }

  function showDeliveryCalc(dist){
    const info=document.getElementById('delivery-info');
    if(info){
      info.innerHTML=`<div class="info-card" style="margin-top:12px;"><p style="line-height:1.6;">✅ Адрес отмечен на карте<br><span style="color:var(--muted);font-size:14px;">Менеджер свяжется и обсудит стоимость и время доставки</span></p></div>`;
    }
    updateTotals();
  }
  function geoDistance(lat1,lon1,lat2,lon2){
    // формула гаверсинуса, км — не зависит от API
    const R=6371;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }
  function findAddress(){
    const addr=document.getElementById('addr-input').value.trim();
    if(!addr){alert('Введите адрес');return;}
    const info=document.getElementById('delivery-info');
    if(info)info.innerHTML='<div class="loading" style="padding:16px;"><div class="spinner"></div>Ищем адрес…</div>';
    // Nominatim (OpenStreetMap) — бесплатный геокодер без ключа
    const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1&accept-language=ru`;
    fetch(url,{headers:{'Accept':'application/json'}}).then(r=>r.json()).then(data=>{
      if(!data||!data.length){if(info)info.innerHTML='<div class="info-card"><p style="color:var(--red);">Адрес не найден. Уточните (город, улица, дом) или нажмите точку на карте.</p></div>';return;}
      const coords=[parseFloat(data[0].lat),parseFloat(data[0].lon)];
      deliveryAddr=data[0].display_name||addr;
      const sh=document.getElementById('addr-shown');if(sh)sh.innerHTML=`<div class="info-card" style="padding:14px;"><div style="color:var(--muted);font-size:13px;">Найдено:</div><div style="font-weight:600;font-size:14px;margin-top:2px;">📍 ${deliveryAddr}</div></div>`;
      if(ymap)ymap.setCenter(coords,15);
      setDeliveryPoint(coords);
    }).catch(e=>{
      console.error('Nominatim:',e);
      if(info)info.innerHTML='<div class="info-card"><p style="color:var(--muted);">Поиск временно недоступен. Нажмите нужную точку прямо на карте.</p></div>';
    });
  }
  function manualKm(v){deliveryKm=parseFloat(v)||null;updateTotals();}
  function doSearch(){
    const q=document.getElementById('search-input').value.toLowerCase().trim();const el=document.getElementById('search-results');
    if(!q){el.innerHTML='';return;}
    const list=allProducts.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q));
    el.innerHTML=list.length?'<div class="grid">'+list.map(cardHTML).join('')+'</div>':'<div class="empty">Ничего не найдено</div>';
  }
  function checkout(){
    if(!Object.keys(cart).length){alert('Корзина пуста');return;}
    if(!user){alert('Сначала войдите по номеру телефона');openLogin();return;}
    let addrText='';
    if(currentShip==='courier'){
      addrText=document.getElementById('addr-input')?document.getElementById('addr-input').value.trim():'';
      if(!addrText){alert('Напишите адрес доставки');return;}
    }
    const sum=cartSum();
    const shipName={pickup:'Самовывоз',courier:'Курьером'}[currentShip];
    const items=Object.entries(cart).map(([id,q])=>{const p=allProducts.find(x=>x.id===id);return{name:p?p.name:'',price:p?p.price:0,qty:q,emoji:p?emojiFor(p):'📦'};});
    const order={
      name:user.name||'',phone:user.phone,items:items,
      delivery:shipName,address:addrText,
      total:sum,status:'Новый',status_order:-1,paid:false,paid_cash:false
    };
    const btn=document.getElementById('checkout-btn');
    if(btn){btn.disabled=true;btn.textContent='Оформляем…';}
    apiSend('/orders','POST',{name:order.name,phone:order.phone,items:order.items,total:order.total,delivery:order.delivery,address:order.address}).then(()=>{
      alert(`Заказ оформлен! ✅\n\n${user.name}, ${user.phone}\nПолучение: ${shipName}${currentShip==='courier'?', '+addrText:''}\nСумма товаров: ${fmt(sum)} ₽\n\n💬 Менеджер проверит заказ, свяжется с вами и подтвердит. После подтверждения вы сможете оплатить.`);
      cart={};saveCart();deliveryKm=null;updateBadge();renderCart();
    }).catch(e=>{console.error(e);alert('Не удалось оформить заказ. Попробуйте ещё раз.');if(btn){btn.disabled=false;updateTotals();}});
  }
  function openLogin(){setAuthMode('login');document.getElementById('login-modal').classList.add('open');}
  function closeLogin(){document.getElementById('login-modal').classList.remove('open');}
  document.getElementById('login-modal').addEventListener('click',e=>{if(e.target.id==='login-modal')closeLogin();});

  let regPhone='', forgotPhone='';
  // показать нужный экран, скрыть остальные
  function showAuthStep(id){
    ['step-login','step-reg-phone','step-forgot-phone','step-forgot-new'].forEach(s=>{
      const el=document.getElementById(s);
      if(el)el.classList.toggle('hidden',s!==id);
    });
  }
  function setAuthMode(mode){
    const isReg=mode==='reg';
    document.getElementById('login-title').textContent=isReg?'Регистрация':'Вход';
    document.getElementById('tab-login').style.background=isReg?'transparent':'var(--accent)';
    document.getElementById('tab-reg').style.background=isReg?'var(--accent)':'transparent';
    document.getElementById('auth-tabs').classList.remove('hidden');
    showAuthStep(isReg?'step-reg-phone':'step-login');
  }

  // ===== ВХОД ПО ПАРОЛЮ =====
  function doLogin(){
    const phone=document.getElementById('login-phone').value.trim();
    const pass=document.getElementById('login-pass').value.trim();
    if(phone.replace(/\D/g,'').length<11){alert('Введите корректный номер телефона');return;}
    if(!pass){alert('Введите пароль');return;}
    const btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Входим…';
    apiSend('/login','POST',{phone:phone.replace(/\D/g,''),password:pass}).then(res=>{
      btn.disabled=false;btn.textContent='Войти';
      user={name:res.user.name||'',phone:res.user.phone};
      localStorage.setItem('sh_user',JSON.stringify(user));
      closeLogin();updateLoginChip();updateProfile();
      alert('Вы вошли! ✅\n'+(user.name||user.phone));
    }).catch(e=>{
      btn.disabled=false;btn.textContent='Войти';
      const msg=String(e.message||'');
      if(msg.indexOf('не зарегистрирован')>=0||msg.indexOf('404')>=0)alert('Этот номер не зарегистрирован.\nНажмите «Регистрация».');
      else alert('Неверный телефон или пароль');
    });
  }

  // ===== РЕГИСТРАЦИЯ (без SMS) =====
  function regFinish(){
    const name=document.getElementById('reg-name').value.trim();
    const phone=document.getElementById('reg-phone').value.trim();
    const pass=document.getElementById('reg-pass').value.trim();
    if(!name){alert('Введите ваше имя');return;}
    if(phone.replace(/\D/g,'').length<11){alert('Введите корректный номер телефона');return;}
    if(!pass){alert('Придумайте пароль');return;}
    const ph=phone.replace(/\D/g,'');
    const btn=document.getElementById('reg-send-btn');btn.disabled=true;btn.textContent='Регистрируем…';
    apiSend('/register','POST',{phone:ph,name:name,password:pass}).then(res=>{
      btn.disabled=false;btn.textContent='Зарегистрироваться';
      user={name:name,phone:ph};
      localStorage.setItem('sh_user',JSON.stringify(user));
      closeLogin();updateLoginChip();updateProfile();
      alert('Регистрация завершена! ✅\nТеперь вы можете входить по телефону и паролю.');
    }).catch(e=>{btn.disabled=false;btn.textContent='Зарегистрироваться';alert('Ошибка регистрации. Возможно, номер уже зарегистрирован.');console.error(e);});
  }

  // ===== ЗАБЫЛ ПАРОЛЬ (без SMS — просто новый пароль по номеру) =====
  function showForgot(){document.getElementById('auth-tabs').classList.add('hidden');document.getElementById('login-title').textContent='Восстановление';showAuthStep('step-forgot-phone');}
  function forgotFinish(){
    const phone=document.getElementById('forgot-phone').value.trim();
    const pass=document.getElementById('forgot-pass').value.trim();
    if(phone.replace(/\D/g,'').length<11){alert('Введите корректный номер');return;}
    if(!pass){alert('Придумайте новый пароль');return;}
    forgotPhone=phone.replace(/\D/g,'');
    apiSend('/reset-password','POST',{phone:forgotPhone,password:pass}).then(()=>{
      alert('Пароль изменён! ✅\nТеперь войдите с новым паролем.');
      setAuthMode('login');
      document.getElementById('login-phone').value=phone;
    }).catch(e=>{const msg=String(e.message||'');if(msg.indexOf('404')>=0||msg.indexOf('не зарегист')>=0)alert('Этот номер не зарегистрирован');else alert('Ошибка');console.error(e);});
  }
  let pendingName='';
  function logout(){user=null;localStorage.removeItem('sh_user');updateLoginChip();updateProfile();}
  function updateLoginChip(){
    const chip=document.getElementById('login-chip');
    if(!chip)return;
    if(user){chip.textContent='👤 '+(user.name||user.phone);chip.classList.add('logged');chip.onclick=()=>switchView('profile');}
    else{chip.textContent='👤 Войти';chip.classList.remove('logged');chip.onclick=openLogin;}
  }
  const STATUS_STEPS=['Новый','Оплата','Сборка','Готов к выдаче'];
  const STATUS_DELIVERY=['Новый','Оплата','Сборка','Едет по адресу','Доставлен'];
  function updateProfile(){
    updateLoginChip();
    const el=document.getElementById('profile-content');
    if(!user){
      el.innerHTML=`<div class="profile-hero"><div class="ava">👤</div><h2 style="font-size:24px;font-weight:800;margin-bottom:8px;">Вход в профиль</h2><p style="color:var(--muted);margin-bottom:24px;">Войдите, чтобы делать заказы<br>и отслеживать их статус</p><button class="checkout-btn" style="max-width:280px;margin:0 auto;" onclick="openLogin()">Войти по номеру</button></div>`;
      return;
    }
    el.innerHTML=`<div style="padding-top:24px;"><div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;"><div class="ava" style="margin:0;">👤</div><div><div style="font-size:22px;font-weight:800;">${user.name||''}</div><div style="color:var(--muted);">${user.phone}</div></div></div><button class="checkout-btn" onclick="showMyOrders()">📦 Мои заказы</button><button class="checkout-btn" style="background:var(--surface2);margin-top:10px;" onclick="openEditProfile()">✏️ Редактировать профиль</button><button class="checkout-btn" style="background:var(--surface2);margin-top:10px;" onclick="logout()">Выйти</button><div id="my-orders" style="margin-top:20px;"></div></div>`;
  }
  function openEditProfile(){
    const newName=prompt('Ваше имя:',user.name||'');
    if(newName===null)return; // отмена
    const name=newName.trim();
    if(!name){alert('Имя не может быть пустым');return;}
    apiSend('/user/'+user.phone.replace(/\D/g,''),'PUT',{name:name}).then(()=>{
      user.name=name;localStorage.setItem('sh_user',JSON.stringify(user));
      updateProfile();
      alert('Профиль обновлён ✅');
    }).catch(e=>{alert('Не удалось сохранить');console.error(e);});
  }
  function showMyOrders(){
    const box=document.getElementById('my-orders');if(!box||!user)return;
    box.innerHTML='<div class="loading" style="padding:30px;"><div class="spinner"></div>Загрузка заказов…</div>';
    apiGet('/orders?phone='+encodeURIComponent(user.phone)).then(data=>{
      let orders=data||[];
      if(!orders.length){box.innerHTML='<div class="empty" style="padding:30px;">У вас пока нет заказов</div>';return;}
      box.innerHTML=orders.map(o=>{
        const isDelivery=(o.delivery&&(o.delivery.indexOf('урьер')>=0||o.delivery.indexOf('оставка')>=0))||(o.address&&o.address.length>0);
        const steps=isDelivery?STATUS_DELIVERY:STATUS_STEPS;
        const step=typeof o.status_order==='number'?o.status_order:-1;
        const dt=o.created_at?new Date(o.created_at).toLocaleString('ru-RU',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}):'';
        const itemsList=(o.items||[]).map(it=>`${it.emoji||'📦'} ${it.name} × ${it.qty}`).join('<br>');
        let statusBlock='';
        if(step===-1){
          statusBlock=`<div style="background:rgba(59,130,246,.15);border-radius:12px;padding:14px;text-align:center;"><div style="font-size:15px;font-weight:700;color:#60a5fa;">🕓 Новый заказ</div><div style="color:var(--muted);font-size:13px;margin-top:4px;">Менеджер проверяет и скоро свяжется с вами</div></div>`;
        } else {
          statusBlock=`<div style="display:flex;align-items:flex-start;">`+steps.map((s,i)=>`<div style="flex:1;text-align:center;"><div style="width:24px;height:24px;border-radius:50%;margin:0 auto 4px;background:${i<=step?'var(--accent)':'var(--surface2)'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${i<=step?'✓':i+1}</div><div style="font-size:10px;color:${i<=step?'var(--accent)':'var(--muted)'};">${s}</div></div>`).join('<div style="flex:0.3;height:2px;background:var(--border);margin-top:11px;"></div>')+`</div>`;
        }
        let payBlock='';
        const lastStep=steps.length-1;
        if(o.paid){
          payBlock=`<div style="margin-top:14px;text-align:center;color:var(--green);font-weight:700;">✅ Оплачено онлайн</div>`;
        } else if(o.pay_type==='cash'||o.paid_cash){
          if(step>=lastStep){
            payBlock=`<div style="margin-top:14px;text-align:center;color:var(--green);font-weight:700;">✅ Оплачено наличными</div>`;
          } else {
            payBlock=`<div style="margin-top:14px;text-align:center;color:var(--muted);font-size:14px;">💵 Оплата наличными при получении</div>`;
          }
        } else if(step===0){
          payBlock=`<button class="checkout-btn" style="margin-top:14px;" onclick="payOrder('${o.id}')">💳 Оплатить картой — ${fmt(o.total)} ₽</button>`;
        }
        // строка доставки с ценой
        const delivCost=o.delivery_cost||0;
        const delivLine=isDelivery?`🚚 ${o.address||''}${delivCost?' · доставка '+fmt(delivCost)+' ₽':''}`:'🏪 Самовывоз';
        return `<div class="info-card" style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="color:var(--muted);font-size:13px;">${dt}</span><span class="price">${fmt(o.total)} ₽</span></div><div style="color:var(--text);line-height:1.6;margin-bottom:14px;">${itemsList}</div><div style="color:var(--muted);font-size:13px;margin-bottom:14px;">${delivLine}</div>${statusBlock}${payBlock}</div>`;
      }).join('');
    }).catch(e=>{console.error(e);box.innerHTML='<div class="empty" style="padding:30px;">Не удалось загрузить заказы</div>';});
  }
  function payOrder(id){
    if(!confirm('Перейти к оплате картой через ЮKassa?'))return;
    apiSend('/pay/create','POST',{orderId:id}).then(res=>{
      if(res.url){
        // переходим на страницу оплаты ЮKassa
        window.location.href=res.url;
      }else{
        alert('Не удалось создать платёж');
      }
    }).catch(e=>{
      console.error(e);
      alert('Оплата временно недоступна. Свяжитесь с менеджером.');
    });
  }
  function switchView(v){
    ['catalog','cats','cart','fav','chat','profile'].forEach(n=>{const el=document.getElementById('view-'+n);if(el)el.classList.toggle('hidden',n!==v);});
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
    if(v==='cart')renderCart();if(v==='fav')renderFav();if(v==='profile')updateProfile();if(v==='cats')renderCatsGrid();if(v==='chat')openChat();
    window.scrollTo(0,0);
  }
  // ===== ЭКРАН КАТЕГОРИЙ =====
  function renderCatsGrid(){
    const box=document.getElementById('cats-grid');if(!box)return;
    const icons={'Инструменты':'🔧','Материалы':'🧱','Сантехника':'🚿','Отделка':'🎨','Электрика':'💡'};
    const cats=categories.filter(c=>c!=='Все');
    box.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+cats.map(c=>
      `<div onclick="selectCatFromGrid('${c.replace(/'/g,"")}')" style="background:var(--surface2);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;"><div style="font-size:40px;margin-bottom:8px;">${icons[c]||'📦'}</div><div style="font-weight:700;">${c}</div></div>`
    ).join('')+'</div>';
  }
  function selectCatFromGrid(cat){
    currentCat=cat;switchView('catalog');
    setTimeout(()=>{renderCats();renderProducts();},50);
  }

  // ===== ЧАТ С АДМИНОМ =====
  const MANAGER_PHONE='+7 925 008 77 88';
  let chatTimer=null;
  function openChat(){
    const box=document.getElementById('view-chat');if(!box)return;
    if(!user){box.innerHTML='<div style="padding:40px 20px;text-align:center;"><div style="font-size:48px;margin-bottom:16px;">💬</div><h2 style="margin-bottom:10px;">Чат с менеджером</h2><p style="color:var(--muted);margin-bottom:20px;">Войдите, чтобы написать менеджеру</p><button class="checkout-btn" onclick="openLogin()">Войти</button></div>';return;}
    box.innerHTML=`
      <div style="position:sticky;top:0;background:var(--bg);padding:16px 0;border-bottom:1px solid var(--border);z-index:5;">
        <div style="font-weight:800;font-size:18px;">💬 Менеджер StroyHous</div>
        <a href="tel:${MANAGER_PHONE.replace(/\s/g,'')}" style="color:var(--accent);font-size:14px;text-decoration:none;">📞 ${MANAGER_PHONE}</a>
      </div>
      <div id="chat-messages" style="padding:16px 0 90px;min-height:300px;"><div class="loading"><div class="spinner"></div></div></div>
      <div style="position:fixed;left:0;right:0;bottom:84px;background:var(--bg);padding:10px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--border);max-width:600px;margin:0 auto;z-index:50;">
        <label style="cursor:pointer;font-size:24px;flex-shrink:0;">📎<input type="file" accept="image/*" style="display:none;" onchange="sendChatPhoto(this)"></label>
        <input id="chat-input" class="field" style="margin:0;flex:1;" placeholder="Сообщение…" onkeydown="if(event.key==='Enter')sendChatMsg()">
        <button onclick="sendChatMsg()" style="flex-shrink:0;background:var(--accent);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;">➤</button>
      </div>`;
    loadChatMessages();
    if(chatTimer)clearInterval(chatTimer);
    chatTimer=setInterval(()=>{if(!document.getElementById('view-chat').classList.contains('hidden'))loadChatMessages(true);},5000);
  }
  function loadChatMessages(silent){
    apiGet('/messages/'+user.phone.replace(/\D/g,'')).then(msgs=>{
      const box=document.getElementById('chat-messages');if(!box)return;
      if(!msgs.length){box.innerHTML='<div style="text-align:center;color:var(--muted);padding:40px 0;">Напишите первое сообщение менеджеру 👋</div>';return;}
      box.innerHTML=msgs.map(m=>{
        const mine=m.sender==='client';
        const img=m.image?`<img src="${m.image.indexOf('http')===0?m.image:'https://api.stroyhous.ru'+m.image}" style="max-width:200px;border-radius:10px;margin-top:${m.text?'6px':'0'};display:block;">`:'';
        const time=new Date(m.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        return `<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'};margin-bottom:10px;"><div style="max-width:75%;background:${mine?'var(--accent)':'var(--surface2)'};color:${mine?'#fff':'var(--text)'};padding:10px 14px;border-radius:16px;border-bottom-${mine?'right':'left'}-radius:4px;">${m.text?`<div>${m.text}</div>`:''}${img}<div style="font-size:11px;opacity:.7;margin-top:4px;text-align:right;">${time}</div></div></div>`;
      }).join('');
      if(!silent)box.scrollIntoView(false),window.scrollTo(0,document.body.scrollHeight);
    }).catch(e=>console.error(e));
  }
  function sendChatMsg(){
    const inp=document.getElementById('chat-input');const text=inp.value.trim();if(!text)return;
    inp.value='';
    apiSend('/messages','POST',{phone:user.phone.replace(/\D/g,''),sender:'client',text:text,name:user.name||''}).then(()=>{
      loadChatMessages();
    }).catch(e=>{console.error(e);alert('Не отправилось');});
  }
  function sendChatPhoto(input){
    const file=input.files[0];if(!file)return;
    const fd=new FormData();fd.append('photo',file);
    fetch(API+'/upload',{method:'POST',body:fd}).then(r=>r.json()).then(res=>{
      if(res.url){
        apiSend('/messages','POST',{phone:user.phone.replace(/\D/g,''),sender:'client',image:res.url,name:user.name||''}).then(()=>loadChatMessages());
      }
    }).catch(e=>{console.error(e);alert('Фото не отправилось');});
    input.value='';
  }

  loadProducts();loadCategories();updateLoginChip();
</script>
</body>
</html>
